apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
data:
  realm-export.json: |
    {
      "realm": "picture-dictionary",
      "enabled": true,
      "roles": {
        "realm": [
          { "name": "LEARNER" },
          { "name": "CONTENT_MANAGER" },
          { "name": "HOTSPOT_EDITOR" }
        ]
      },
      "clients": [
        {
          "clientId": "edge-service",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "edge-secret-dev-123",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": [
            "http://localhost/*",
            "http://localhost:8080/*",
            "http://auth.localhost/*",
            "http://edge-service/*"
          ],
          "webOrigins": [
            "*"
          ],
          "attributes": {
            "post.logout.redirect.uris": "+"
          }
        }
      ],
      "users": [
        {
          "username": "learner1",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["LEARNER"]
        },
        {
          "username": "manager1",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["CONTENT_MANAGER"]
        },
        {
          "username": "hotspot1",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["HOTSPOT_EDITOR"]
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: admin
            - name: KC_HOSTNAME
              value: http://auth.localhost
            - name: KC_HOSTNAME_DEBUG
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import/realm-export.json
              subPath: realm-export.json
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080